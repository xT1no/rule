;Custom_OpenClash_Rules_Optimized
;极致精简合并版：防 DNS 泄漏与多地区智能/手动复合模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<建议>搭配本项目配套设置，实现最佳化的 OpenClash 使用效果！
;设置方案：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88

[custom]
;====================================================================
; 1. 规则标志位 (严格保留原第一段的防DNS泄漏序列与完整业务备注)
;====================================================================

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;本项目收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

;本项目收录的代理规则
ruleset=🚀 手动选择,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 手动选择,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800

;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn

;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn

;Steam 下载 CDN 直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800

;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download

;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker

;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名（合并至社交即时组）
ruleset=🌐 社交即时,[]GEOSITE,category-communication

;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体（合并至社交即时组）
ruleset=🌐 社交即时,[]GEOSITE,category-social-media-!cn

;AI 规则部分完美合并（包含 OpenAI 以及各类特殊网络环境要求的 AI 服务）
ruleset=🤖 智能AI,[]GEOSITE,openai
ruleset=🤖 智能AI,[]GEOSITE,category-ai-!cn

;GitHub 规则
ruleset=🚀 手动选择,[]GEOSITE,github

;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🚀 手动选择,[]GEOSITE,category-speedtest

;游戏平台相关（整合 Steam 及全平台商店、登录分流）
ruleset=🎮 游戏平台,[]GEOSITE,steam
ruleset=🎮 游戏平台,[]GEOSITE,category-games

;谷歌与 YouTube 合并（对解锁无特殊要求，追求速度）
ruleset=🇬 谷歌视频,[]GEOSITE,youtube
ruleset=🇬 谷歌视频,[]GEOSITE,googlefcm
ruleset=🇬 谷歌视频,[]GEOSITE,google

;海外高要求流媒体与流媒体解锁合并组（TikTok/Netflix/Disney+/HBO/巴哈姆特等）
ruleset=🎥 海外流媒体,[]GEOSITE,apple-tvplus
ruleset=🎥 海外流媒体,[]GEOSITE,tiktok
ruleset=🎥 海外流媒体,[]GEOSITE,netflix
ruleset=🎥 海外流媒体,[]GEOSITE,disney
ruleset=🎥 海外流媒体,[]GEOSITE,hbo
ruleset=🎥 海外流媒体,[]GEOSITE,primevideo
ruleset=🎥 海外流媒体,[]GEOSITE,bahamut

;Emby 包括主流 Emby 服务相关域名（保持直连或根据需要单独划分，此处原要求为直连）
ruleset=🎯 全球直连,[]GEOSITE,category-emby

;Spotify 音乐服务
ruleset=🎵 音乐服务,[]GEOSITE,spotify

;大厂通用基础服务（直连或走国外通用，此处使用苹果/微软保持直连或普通国外，原模板原话：走苹果/微软服务）
ruleset=🎯 全球直连,[]GEOSITE,apple
ruleset=🎯 全球直连,[]GEOSITE,microsoft

;国外媒体与电商（划分到国外普通组）
ruleset=🌍 国外普通,[]GEOSITE,category-entertainment
ruleset=🌍 国外普通,[]GEOSITE,category-ecommerce

;GFW 列表名单
ruleset=🚀 手动选择,[]GEOSITE,gfw

;IP规则补充 (防DNS泄漏的核心IP直连与代理规则序列)
ruleset=🌐 社交即时,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交即时,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交即时,[]GEOIP,facebook,no-resolve
ruleset=🇬 谷歌视频,[]GEOIP,google,no-resolve
ruleset=🎥 海外流媒体,[]GEOIP,netflix,no-resolve

;由于 OpenClash 使用的大陆白名单收率不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn

;由于 OpenClash 使用的大陆白名单收率不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消

;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL


